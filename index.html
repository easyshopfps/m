<!DOCTYPE html>
<html lang="lo" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Karaoke — ແປພາສາ</title>

  <!-- Favicon = logo -->
  <link rel="icon" type="image/jpeg" href="https://s.imgz.io/2026/03/14/InShot_20260314_092137067ff6702fec38da347.jpg">
  <link rel="apple-touch-icon" href="https://s.imgz.io/2026/03/14/InShot_20260314_092137067ff6702fec38da347.jpg">

  <!-- Open Graph — รูปที่เห็นเวลาแชร์ลิงก์ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Easy Karaoke — ອີຊີ ຄາລາໂອເກະ">
  <meta property="og:description" content="ແປພາສາລາວ ↔ ຄາລາໂອເກະ · Lao Karaoke Translation Tool · 6,000+ ຄຳສັບ">
  <meta property="og:image" content="https://s.imgz.io/2026/03/14/InShot_20260314_092137067ff6702fec38da347.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://s.imgz.io/2026/03/14/InShot_20260314_092137067ff6702fec38da347.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=Noto+Sans+Lao:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <!-- SPLASH / LOADING SCREEN -->
  <div id="splash">
    <div class="splash-icon"><img src="https://s.imgz.io/2026/03/14/ei_1773455048181-removebg-previewac81e5815dd39a9e.png" class="splash-logo-img" alt="Easy Karaoke"></div>
    <div class="splash-wordmark">
      <div class="splash-en" id="splashLetters"></div>
      <div class="splash-lo">ອີຊີ ຄາລາໂອເກະ</div>
      <div class="splash-sub">Lao Karaoke Translation Tool</div>
    </div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>

  <div class="grid-bg" aria-hidden="true"></div>
  <div class="orb-wrap" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <div class="wrap">
    <!-- NAV -->
    <nav>
      <div class="wordmark">EASY <strong>KARAOKE</strong></div>
      <div class="nav-right">
        <button class="toggle" id="themeBtn" aria-label="Toggle theme" title="ປ່ຽນໂໝດ">
          <span class="toggle-icon" id="themeIcon">🌙</span>
        </button>
      </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
      <div class="hero-eyebrow">Lao ↔ Karaoke Translator</div>
      <div class="hero-title-row">
        <h1>ແປ<em>ພາສາ</em><br>ໂອເກະ</h1>
        <div class="hero-stat">
          <div class="stat-num">6K+</div>
          <div class="stat-label">ຄຳສັບ · Words</div>
        </div>
      </div>
    </header>

    <!-- DIRECTION TABS -->
    <div class="dir-row">
      <button class="dir-btn active" onclick="setDir('karaoke-to-lao',this)">Karaoke <i class="dir-arrow">→</i> ລາວ</button>
      <button class="dir-btn" onclick="setDir('lao-to-karaoke',this)">ລາວ <i class="dir-arrow">→</i> Karaoke</button>
    </div>
    <select id="direction" style="display:none">
      <option value="karaoke-to-lao">karaoke-to-lao</option>
      <option value="lao-to-karaoke">lao-to-karaoke</option>
    </select>


    <!-- PANEL -->
    <div class="panel" id="mainPanel">

      <!-- INPUT -->
      <div class="panel-input">
        <div class="input-ring" id="inputRing">
          <textarea id="inputText"
            placeholder="ພິມຄາລາໂອເກະ ຫຼື ຕົວລາວ…   Ctrl+Enter ເພື່ອແປ"
            autocomplete="off" spellcheck="false"></textarea>
        </div>
      </div>

      <!-- LOADING BAR -->
      <div class="loading-bar" id="loadingBar"></div>

      <!-- OUTPUT -->
      <div class="panel-output">
        <div class="out-meta">
          <span class="out-label">ຜົນການແປ</span>
        </div>
        <div id="output"><span class="ph">— ຜົນການແປຈະປາກົດທີ່ນີ້ —</span></div>
      </div>

      <!-- ACTIONS (below output) -->
      <div class="action-bar">
        <button class="btn btn-gold" onclick="translateText()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 3l14 9-14 9V3z"/></svg>
          ແປ
        </button>
        <button class="btn btn-outline" onclick="clearText()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
          ລ້າງ
        </button>
        <button class="btn btn-copy" id="copyBtn" onclick="copyOutput()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="copyIco"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          ຄັດລອກ
        </button>
        <span class="char-pill" id="charPill">0</span>
      </div>

    </div><!-- .panel -->

    <!-- FOOTER -->
    <footer>
      <span class="footer-copy">© 2025 Easy Karaoke · ອີຊີ ຄາລາໂອເກະ</span>
      <span class="footer-tag">Lao ↔ Karaoke Translation Tool</span>
    </footer>
  </div><!-- .wrap -->

  <!-- Dictionary chunks (lazy parallel load) -->
  <script src="dict_lao1.js" defer></script>
  <script src="dict_lao2.js" defer></script>
  <script src="dict_lao3.js" defer></script>
  <script src="dict_kar_abc.js" defer></script>
  <script src="dict_kar_defj.js" defer></script>
  <script src="dict_kar_klm.js" defer></script>
  <script src="dict_kar_nz.js" defer></script>
  <!-- App logic -->
  <script src="app.js" defer></script>

</body>
</html>
